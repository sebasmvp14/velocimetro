<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; overflow: hidden; margin: 0; }
        
        #hud-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 400px;
            height: 250px;
        }

        .capa { position: absolute; width: 100%; height: 100%; object-fit: contain; }

        /* Contenedores para efecto de llenado circular */
        .progreso-circ {
            position: absolute;
            width: 100%; height: 100%;
            /* El truco: usamos una máscara para revelar la barra */
            mask-image: radial-gradient(circle, transparent 50%, black 51%);
            -webkit-mask-image: radial-gradient(circle, transparent 55%, black 56%);
        }

        /* Texto de velocidad en el centro */
        #txt-velocidad {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Arial Italic', sans-serif;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <img src="Velocimetro_Base.png" class="capa">

        <img src="barras_y_marcadores/Barra_Arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/Barra_Gasolina.png" id="barra-gas" class="capa">
        <img src="barras_y_marcadores/Barra_Motor.png" id="barra-motor" class="capa">

        <img src="barras_y_marcadores/Marcador.png" class="capa">
        <img src="barras_y_marcadores/Marcador_Gasolina.png" class="capa">
        <img src="barras_y_marcadores/Marcador_Motor.png" class="capa">

        <div id="txt-velocidad">
            <span id="num-vel">000</span>
            <div style="font-size: 18px; opacity: 0.7;">km/h</div>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas, motor] = event.detail;

            // Actualizar número de velocidad
            document.getElementById('num-vel').innerText = Math.floor(vel).toString().padStart(3, '0');

            // Efecto de llenado circular (Arco de velocidad)
            // Suponiendo que el arco empieza en -120deg y termina en 120deg
            const angleVel = (vel / 200) * 240 - 120; 
            document.getElementById('barra-vel').style.clipPath = `inset(0 ${100 - (vel/2)}% 0 0)`; 
            // Nota: Si el arco es muy curvo, usaremos 'conic-gradient' en el CSS de máscara.

            // Barra Gasolina (Verde)
            document.getElementById('barra-gas').style.opacity = gas / 100;
            
            // Barra Motor (Naranja)
            document.getElementById('barra-motor').style.opacity = motor / 1000;
        });
    </script>
</body>
</html>
