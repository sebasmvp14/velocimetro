<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; overflow: hidden; }
        
        /* Contenedor en la esquina */
        #hud {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 400px;
            height: 400px;
        }

        /* Todas las capas miden lo mismo y se enciman solas */
        .capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Estilo del texto (Ajusta solo el tamaño aquí si lo ves raro) */
        #txt-vel {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: white;
            /* Aquí puedes poner la fuente que quieras, 'Arial Black' es la más parecida */
            font-family: 'Arial Black', sans-serif; 
        }
    </style>
</head>
<body>

    <div id="hud">
        <img src="velocimetro_base.png" class="capa">

        <img src="barras_y_marcadores/barra_arco.png" id="b-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="b-gas" class="capa">
        <img src="barras_y_marcadores/barra_motor.png" id="b-mot" class="capa">

        <img src="barras_y_marcadores/marcador.png" class="capa">
        <img src="barras_y_marcadores/marcador_gasolina.png" class="capa">
        <img src="barras_y_marcadores/marcador_motor.png" class="capa">

        <div id="txt-vel">
            <div id="num" style="font-size: 45px; line-height: 1;">000</div>
            <div id="unit" style="font-size: 14px; font-family: Arial;">km/h</div>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas, motor] = event.detail;
            
            // Número
            document.getElementById('num').innerText = Math.floor(vel).toString().padStart(3, '0');

            // Arco de velocidad
            let clipV = 100 - (vel / 2.0); 
            document.getElementById('b-vel').style.clipPath = `inset(0 ${clipV}% 0 0)`;

            // Gasolina y Motor
            document.getElementById('b-gas').style.opacity = (gas / 100);
            document.getElementById('b-mot').style.opacity = (motor / 100);
        });
    </script>
</body>
</html>
