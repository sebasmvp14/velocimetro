<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background-color: transparent; overflow: hidden; margin: 0; padding: 0; }

        #hud-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 300px; 
            height: 300px;
        }

        .capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #txt-velocidad {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 142px; /* Ajusta esto para centrar el 000 en tu círculo */
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 30px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <img src="velocimetro_base.png" class="capa">

        <img src="barras_y_marcadores/barra_arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-gas" class="capa">
        <img src="barras_y_marcadores/barra_motor.png" id="barra-motor" class="capa">

        <img src="barras_y_marcadores/marcador.png" class="capa">
        <img src="barras_y_marcadores/marcador_gasolina.png" class="capa">
        <img src="barras_y_marcadores/marcador_motor.png" class="capa">

        <div id="txt-velocidad">
            <span id="num-vel">000</span>
            <div style="font-size: 12px; font-family: Arial; opacity: 0.8;">km/h</div>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas, motor] = event.detail;

            // 1. Actualizar el texto de velocidad
            document.getElementById('num-vel').innerText = Math.floor(vel).toString().padStart(3, '0');

            // 2. Barra de Velocidad (Arco)
            let clipVel = 100 - (vel / 2.2); // Ajusta el 2.2 según el largo de tu arco
            document.getElementById('barra-vel').style.clipPath = `inset(0 ${clipVel}% 0 0)`;

            // 3. Barra de Gasolina (Ajuste de visibilidad)
            // Si quieres que se "llene", usa inset. Si solo quieres que brille, usa opacity.
            document.getElementById('barra-gas').style.opacity = (gas / 100); 
            
            // 4. Barra de Motor
            document.getElementById('barra-motor').style.opacity = (motor / 100);
        });
    </script>
</body>
</html>
