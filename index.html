<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; overflow: hidden; }

        #hud {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 300px;
            height: 300px;
        }

        .capa { position: absolute; }

        /* --- AJUSTE MANUAL AQUÍ --- */
        
        #base { top: 0; left: 0; width: 250px; z-index: 1; }

        #barra-vel { 
            top: 25px;   /* Sube/Baja la barra verde */
            left: 25px;  /* Mueve Izquierda/Derecha la barra verde */
            width: 200px; 
            z-index: 2;
        }

        #barra-gas { 
            top: 10px;   /* Ajusta posición de gasolina */
            left: 220px; 
            width: 40px; 
            z-index: 2;
        }

        #txt-velocidad {
            position: absolute;
            top: 105px; /* Mueve el número arriba o abajo */
            left: 85px; /* Mueve el número a los lados */
            width: 80px;
            text-align: center;
            color: white;
            font-family: 'Arial Black', sans-serif;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="hud">
        <img src="velocimetro_base.png" id="base" class="capa">
        
        <img src="barras_y_marcadores/barra_arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-gas" class="capa">

        <div id="txt-velocidad">
            <div id="num-vel" style="font-size: 35px;">000</div>
            <div style="font-size: 12px; opacity: 0.8;">km/h</div>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas, motor] = event.detail;
            document.getElementById('num-vel').innerText = Math.floor(vel).toString().padStart(3, '0');

            // Ajuste del arco
            let percent = 100 - (vel / 2.0); 
            document.getElementById('barra-vel').style.clipPath = `inset(0 ${percent}% 0 0)`;
        });
    </script>
</body>
</html>
