<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Fondo gris oscuro para saber que la web cargó. Luego lo pondremos en transparent */
        body { background-color: #1a1a1a; overflow: hidden; margin: 0; padding: 0; }

        #hud-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 400px;
            height: 250px;
        }

        .capa {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #txt-velocidad {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <img src="velocimetro_base.png" class="capa">

        <img src="barras_y_marcadores/barra_arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-gas" class="capa">
        <img src="barras_y_marcadores/barra_motor.png" id="barra-motor" class="capa">

        <img src="barras_y_marcadores/marcador.png" class="capa">
        <img src="barras_y_marcadores/marcador_gasolina.png" class="capa">
        <img src="barras_y_marcadores/marcador_motor.png" class="capa">

        <div id="txt-velocidad">
            <span id="num-vel">000</span>
            <div style="font-size: 18px; opacity: 0.8;">km/h</div>
        </div>
    </div>

    <script>
        // Esta función recibe los datos desde el servidor SAMP
        window.addEventListener('updateHUD', (event) => {
            const data = event.detail;
            const vel = data[0] || 0;
            const gas = data[1] || 0;
            const motor = data[2] || 0;

            // Actualizar número de velocidad
            document.getElementById('num-vel').innerText = 
                Math.floor(vel).toString().padStart(3, '0');

            // Efecto de recorte para la barra de velocidad (arco)
            // Ajusta el (vel/2) dependiendo de qué tan larga sea tu barra
            document.getElementById('barra-vel').style.clipPath = 
                `inset(0 ${100 - (vel/2)}% 0 0)`;

            // Opacidad para gasolina y motor según estado
            document.getElementById('barra-gas').style.opacity = gas / 100;
            document.getElementById('barra-motor').style.opacity = motor / 100;
        });
    </script>
</body>
</html>
