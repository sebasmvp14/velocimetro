<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Fondo oscuro para ver el contraste */
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; }
        
        #debug-info { position: absolute; top: 10px; left: 10px; font-size: 12px; color: yellow; }

        #hud-container {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 400px;
            height: 250px;
            border: 1px dashed #333; /* Para ver dónde está el HUD */
        }

        .capa {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Si la imagen no carga, se verá este estilo */
        img:after { 
            content: "Error cargando: " attr(src);
            display: block;
            font-size: 10px;
            color: red;
            background: black;
        }
    </style>
</head>
<body>

    <div id="debug-info">Estado: Cargando archivos...</div>

    <div id="hud-container">
        <img src="velocimetro_base.png" class="capa" onerror="document.getElementById('debug-info').innerHTML='Error en: velocimetro_base.png'">

        <img src="barras_y_marcadores/barra_arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-gas" class="capa">
        
        <div id="txt-velocidad" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:40px;">
            <span id="num-vel">000</span>
        </div>
    </div>

    <script>
        // Confirmación de que el JS cargó
        document.getElementById('debug-info').innerHTML = "Web lista. Esperando datos de SAMP...";
        
        window.addEventListener('updateHUD', (event) => {
            const vel = event.detail[0] || 0;
            document.getElementById('num-vel').innerText = Math.floor(vel).toString().padStart(3, '0');
        });
    </script>
</body>
</html>
