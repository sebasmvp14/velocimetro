<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Fondo transparente para el juego */
        body { background-color: transparent; overflow: hidden; margin: 0; padding: 0; }

        #hud-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 400px; 
            height: 400px;
        }

        .capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Al medir todas 400x400, encajarán solas sin moverse */
            object-fit: contain;
        }

        #txt-velocidad {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%; /* Ajusta este % para subir/bajar el número dentro del círculo */
            transform: translateY(-50%);
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 40px;
            z-index: 10;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="hud-container">
        <img src="velocimetro.png" class="capa">

        <img src="barras_y_marcadores/barra_arco.png" id="barra-vel" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-gas" class="capa">
        <img src="barras_y_marcadores/barra_motor.png" id="barra-motor" class="capa">

        <div id="txt-velocidad">
            <span id="num-vel">000</span>
            <div style="font-size: 14px; font-family: Arial; opacity: 0.8;">km/h</div>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas, motor] = event.detail;

            // Actualizar número
            document.getElementById('num-vel').innerText = Math.floor(vel).toString().padStart(3, '0');

            // Movimiento del arco de velocidad
            // El 2.0 es para un arco de 200km/h. Si tu arco es de 100km/h, quita el /2.0
            let clipVel = 100 - (vel / 2.0); 
            document.getElementById('barra-vel').style.clipPath = `inset(0 ${clipVel}% 0 0)`;

            // Gasolina y Motor (por opacidad)
            document.getElementById('barra-gas').style.opacity = (gas / 100);
            document.getElementById('barra-motor').style.opacity = (motor / 100);
        });
    </script>
</body>
</html>
