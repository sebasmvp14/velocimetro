<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; margin: 0; overflow: hidden; }

        #hud {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 400px;
            height: 400px;
        }

        .capa {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ESTE ES EL ÚNICO TEXTO QUE DEBE EXISTIR */
        #contenedor-texto {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            z-index: 10;
        }

        #num {
            color: white;
            font-family: 'Arial Black', sans-serif;
            font-size: 45px;
            display: block;
            line-height: 1;
        }

        .unidad {
            color: white;
            font-family: Arial;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="hud">
        <img src="velocimetro_base.png" class="capa">
        <img src="barras_y_marcadores/barra_arco.png" id="barra-v" class="capa">
        <img src="barras_y_marcadores/barra_gasolina.png" id="barra-g" class="capa">

        <img src="barras_y_marcadores/marcador.png" class="capa">

        <div id="contenedor-texto">
            <span id="num">000</span>
            <span class="unidad">km/h</span>
        </div>
    </div>

    <script>
        window.addEventListener('updateHUD', (event) => {
            const [vel, gas] = event.detail;
            
            // Actualiza el número
            document.getElementById('num').innerText = Math.floor(vel).toString().padStart(3, '0');

            // Recorte de barra
            let clip = 100 - (vel / 2.0); 
            document.getElementById('barra-v').style.clipPath = `inset(0 ${clip}% 0 0)`;

            // Gasolina
            document.getElementById('barra-g').style.opacity = (gas / 100);
        });
    </script>
</body>
</html>
